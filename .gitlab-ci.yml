default:
  image: andreysenov/firebase-tools:latest

stages:
  - validate
  - prebuild
  - build
  - deploy

# Job to validate merge rules
validate-merge-rules:
  stage: validate
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^release-/ || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "staging")'
      when: on_success
    - when: never
  script:
    - |
      # Check if merging to master
      if [ "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" = "master" ]; then
        # Allow merges from staging or release-* branches to master
        if [ "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" = "staging" ] || echo "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" | grep -q "^release-"; then
          echo "✅ Valid merge: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME -> master"
          echo "Merge request validation passed."
        else
          echo "❌ Error: Only 'staging' or 'release-*' branches can be merged to master!"
          echo "Source branch: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
          echo "Target branch: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
          echo ""
          echo "Valid flows to master:"
          echo "- staging -> master (direct deployment)"
          echo "- release-* -> master (release deployment)"
          exit 1
        fi
      # Check if merging to release-*
      elif echo "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" | grep -q "^release-"; then
        # Only allow merges from staging to release-*
        if [ "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" != "staging" ]; then
          echo "❌ Error: Only 'staging' branch can be merged to release branches!"
          echo "Source branch: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
          echo "Target branch: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
          echo ""
          echo "Please merge your changes to 'staging' first,"
          echo "then create a merge request from 'staging' to '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME'"
          exit 1
        else
          echo "✅ Valid merge: staging -> $CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
          echo "Merge request validation passed."
        fi
      # Check if merging to staging
      elif [ "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" = "staging" ]; then
        # Allow feature/bugfix branches and release-* branches to merge to staging
        if echo "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" | grep -q "^feature/" || \
           echo "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" | grep -q "^bugfix/" || \
           echo "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" | grep -q "^release-" || \
           [[ "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" =~ ^NF-[0-9]+_ ]]; then
          echo "✅ Valid merge: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME -> staging"
          echo "Merge request validation passed."
        else
          echo "⚠️  Warning: Non-standard branch name merging to staging"
          echo "Source branch: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
          echo "Recommended branch naming:"
          echo "- feature/description"
          echo "- bugfix/description"
          echo "- NF-XXX_description"
          echo "- release-* (for backporting)"
          echo ""
          echo "Allowing merge to proceed..."
        fi
      fi

# Job to prepare preview channel for merge requests targeting staging
pre-branch-build:
  stage: prebuild
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "staging"'
      when: on_success
    - when: never
  script:
    - export FIREBASE_TOKEN=$FIREBASE_TOKEN
    # Hardcode site ID for staging previews
    - export FIREBASE_SITE="narwhal-flutter-staging"
    # Run prepare.mjs to generate preview channel URL and build.env
    - node prepare.mjs
  artifacts:
    reports:
      dotenv: build.env # Export build.env variables (e.g., MY_DEPLOYED_URL)

# Job to prepare preview channel for merge requests targeting release branches
pre-release-build:
  stage: prebuild
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^release-/'
      when: on_success
    - when: never
  script:
    - export FIREBASE_TOKEN=$FIREBASE_TOKEN
    # Hardcode site ID for release previews
    - export FIREBASE_SITE="narwhal-flutter-release"
    # Run prepare.mjs to generate preview channel URL and build.env
    - node prepare.mjs
  artifacts:
    reports:
      dotenv: build.env # Export build.env variables (e.g., MY_DEPLOYED_URL)

# Job to build the Flutter web app
build-job:
  stage: build
  image: ghcr.io/cirruslabs/flutter:3.41.2
  rules:
    - if: '$CI_COMMIT_BRANCH == "staging"' # Run for staging branch commits
    - if: '$CI_COMMIT_BRANCH == "master"' # Run for master branch commits
    - if: '$CI_COMMIT_BRANCH =~ /^release-/' # Run for release branch commits
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"' # Also run for merge requests
  script:
    - flutter --version
    - dart --version
    - ls -la
    - flutter pub get
    - flutter build web # Build web app to build/web/
    - ls -la
  artifacts:
    paths:
      - "build/web/" # Store build/web/ for dependent jobs

# Job to deploy preview channel for merge requests
deploy-branch-preview:
  stage: deploy
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "staging"'
      when: on_success
    - when: never
  dependencies:
    - pre-branch-build
    - build-job
  script:
    - pwd
    - ls -la
    - 'ls -la build/web || echo "Warning: build/web directory missing"'
    - mkdir -p public
    - |
      if ! cp -r build/web/* public/; then
        echo "Error: Failed to copy build/web/ to public/"
        exit 1
      fi
    - firebase hosting:channel:deploy $CI_COMMIT_REF_SLUG --only "staging"
  environment:
    name: preview/$CI_COMMIT_REF_NAME # Dynamic environment for preview
    url: $MY_DEPLOYED_URL # Preview channel URL from build.env
    on_stop: stop-branch-preview # Trigger stop_preview on merge/close

# Job to clean up preview channel after merge
stop-branch-preview:
  stage: deploy
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "staging"'
      when: manual
    - when: never
  dependencies:
    - build-job
  script:
    - pwd
    - ls -la
    - 'ls -la build/web || echo "Warning: build/web directory missing"'
    - mkdir -p public
    - |
      if ! cp -r build/web/* public/; then
        echo "Error: Failed to copy build/web/ to public/"
        exit 1
      fi
    - firebase hosting:channel:delete -f $CI_COMMIT_REF_SLUG --site "narwhal-flutter-staging"
  environment:
    name: preview/$CI_COMMIT_REF_NAME # Match deploy_preview environment
    action: stop # Stop the preview environment

# Job to deploy preview channel for merge requests targeting release branches
deploy-release-preview:
  stage: deploy
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^release-/'
      when: on_success
    - when: never
  dependencies:
    - pre-release-build
    - build-job
  script:
    - pwd
    - ls -la
    - 'ls -la build/web || echo "Warning: build/web directory missing"'
    - mkdir -p public
    - |
      if ! cp -r build/web/* public/; then
        echo "Error: Failed to copy build/web/ to public/"
        exit 1
      fi
    - firebase hosting:channel:deploy $CI_COMMIT_REF_SLUG --only "release"
  environment:
    name: release-preview/$CI_COMMIT_REF_NAME # Dynamic environment for release preview
    url: $MY_DEPLOYED_URL # Preview channel URL from build.env
    on_stop: stop-release-preview # Trigger stop_preview on merge/close

# Job to clean up release preview channel after merge
stop-release-preview:
  stage: deploy
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^release-/'
      when: manual
    - when: never
  dependencies:
    - build-job
  script:
    - pwd
    - ls -la
    - 'ls -la build/web || echo "Warning: build/web directory missing"'
    - mkdir -p public
    - |
      if ! cp -r build/web/* public/; then
        echo "Error: Failed to copy build/web/ to public/"
        exit 1
      fi
    - firebase hosting:channel:delete -f $CI_COMMIT_REF_SLUG --site "narwhal-flutter-release"
  environment:
    name: release-preview/$CI_COMMIT_REF_NAME # Match deploy_release_preview environment
    action: stop # Stop the release preview environment

# Job to deploy to staging site
deploy-staging:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "staging"'
      when: on_success
    - when: never
  dependencies:
    - build-job
  script:
    - mkdir -p public # Create public/ directory
    - |
      if ls -la build/web/; then
        echo "build/web/ directory found"
      else
        echo "Error: build/web/ directory not found"
      fi
    - |
      if ! cp -r build/web/* public/; then
        echo "Error: Failed to copy build/web/ to public/"
        exit 1
      fi
    - firebase deploy --only hosting:"staging"
  environment:
    name: staging # Staging environment
    url: https://narwhal-staging.ics.com # Staging site URL

# Job to deploy to release site
deploy-release:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^release-/'
      when: on_success
    - when: never
  dependencies:
    - build-job
  script:
    - mkdir -p public # Create public/ directory
    - |
      if ls -la build/web/; then
        echo "build/web/ directory found"
      else
        echo "Error: build/web/ directory not found"
      fi
    - |
      if ! cp -r build/web/* public/; then
        echo "Error: Failed to copy build/web/ to public/"
        exit 1
      fi
    - firebase deploy --only hosting:"release"
  environment:
    name: release/$CI_COMMIT_BRANCH # Dynamic release environment
    url: https://narwhal-flutter-release.web.app # Release site URL

# Job to deploy to production site
deploy-production:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - when: never
  dependencies:
    - build-job
  script:
    - mkdir -p public # Create public/ directory
    - |
      if ! cp -r build/web/* public/; then
        echo "Error: Failed to copy build/web/ to public/"
        exit 1
      fi
    - firebase deploy --only hosting:"production"
  environment:
    name: production # Production environment
    url: https://narwhal.ics.com # Production site URL