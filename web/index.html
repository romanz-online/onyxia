<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="onyxia">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <title>Onyxia</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Disable horizontal bounce-scroll to prevent two-finger swipe navigation */
    html,
    body {
      /* Match ThemeHelper.neutral100 dark-mode value (NarwhalColors.neutral900) */
      background-color: #1C1C1E;
      overscroll-behavior-x: none;
      /* Chrome/Edge/Firefox 65+ */
      overscroll-behavior-y: contain;
      /* keep vertical "bounce", optional */
      touch-action: pan-y;
      /* Limit touch actions to vertical pan only */
    }

    /* Additional Safari-specific settings */
    body {
      -webkit-touch-callout: none;
      /* Disable callout */
      user-select: none;
      -webkit-user-select: none;
      /* Disable selection */
      -webkit-tap-highlight-color: transparent;
      /* Remove tap highlight */
    }
    
    .container {
      width: 100vw;
      height: 100vh;
      display: flex;
      /* Default Axis is X*/
      justify-content: center;
      /* Main Axis */
      align-items: center;
      /* Cross Axis */
    }

    #loading_indicator {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1C1C1E;
      z-index: 2147483647; /* sit above flutter-view during boot */
    }

    /* Pulse-dot loader. Mirrors OnyxiaLoadingIndicator in
       lib/presentation/common_widget/onyxia_loading_indicator.dart —
       keep duration / scale / opacity / color in sync if you change them.
       #909699 matches ThemeHelper.neutral500 (NarwhalColors.neutral500);
       hardcoded here because no BuildContext exists pre-Flutter. */
    .pulse-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      opacity: 0.5;
      background-color: #FF9800;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { transform: scale(1);   opacity: 0.8; }
      50%      { transform: scale(1.3); opacity: 1;   }
    }
  </style>
</head>

<body>
  <div id="loading_indicator">
    <span class="pulse-dot" role="status" aria-label="Loading"></span>
  </div>
  <script src="flutter_bootstrap.js" async></script>


  <script>
    window.addEventListener('flutter-first-frame', function () {

      
      setTimeout(function () {
        var loadingIndicator = document.getElementById("loading_indicator");
        if (loadingIndicator) {
          loadingIndicator.remove();
        }
      }, 2000);

    });
  </script>
</body>

</html>
