<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="onyxia">
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">

  <title>Onyxia</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Disable horizontal bounce-scroll to prevent two-finger swipe navigation */
    html,
    body {
      background-color: #1C1C1E;
      overscroll-behavior-x: none;
      /* Chrome/Edge/Firefox 65+ */
      overscroll-behavior-y: contain;
      /* keep vertical "bounce", optional */
      touch-action: pan-y;
      /* Limit touch actions to vertical pan only */
    }

    /* Additional Safari-specific settings */
    body {
      -webkit-touch-callout: none;
      /* Disable callout */
      user-select: none;
      -webkit-user-select: none;
      /* Disable selection */
      -webkit-tap-highlight-color: transparent;
      /* Remove tap highlight */
    }
    
    .container {
      width: 100vw;
      height: 100vh;
      display: flex;
      /* Default Axis is X*/
      justify-content: center;
      /* Main Axis */
      align-items: center;
      /* Cross Axis */
    }

    #loading_indicator {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1F2329;
      z-index: 2147483647; /* sit above flutter-view during boot */
    }

    /* Pulse-dot loader. Mirrors OnyxiaLoadingIndicator */
    .pulse-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      opacity: 0.5;
      background-color: #FF9800;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { transform: scale(1);   opacity: 0.8; }
      50%      { transform: scale(1.3); opacity: 1;   }
    }
  </style>
</head>

<!-- TODO: eventually i'll want to render a skeleton ui that mimics the standard onyxia app layout so that there's no dedicated "loading screen" like this -->
<!-- TODO: cont. at that point i'll also probably remove the 1000ms timer that only exists to mask a bit of loading in the flutter app -->

<!-- TODO: add app name above the loading indicator, big letters "Onyxia" -->

<body>
  <div id="loading_indicator">
    <span class="pulse-dot" role="status" aria-label="Loading"></span>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('onyxia-ready', function () {
      setTimeout(function () {
        var loadingIndicator = document.getElementById("loading_indicator");
        if (loadingIndicator) {
          loadingIndicator.remove();
        }
      }, 1000);
    });
  </script>
</body>

</html>
