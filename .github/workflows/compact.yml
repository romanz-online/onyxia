name: Compact artifact ops

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: compact
  cancel-in-progress: false

jobs:
  compact:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: dart run bin/compact.dart
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
